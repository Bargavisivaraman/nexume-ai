name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install test dependencies
        # The test suite needs FastAPI (security helpers) and httpx (aggregator
        # adapters, tested via httpx.MockTransport) plus pytest. Keep CI fast
        # and reliable rather than building the full runtime freeze.
        run: pip install fastapi httpx pytest

      - name: Run tests
        run: python -m pytest -q
